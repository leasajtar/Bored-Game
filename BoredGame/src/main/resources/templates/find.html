<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Find an event</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://kit.fontawesome.com/34542901a1.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<section class="nav-bar">
    <div class="container-fluid">
        <div class="d-flex align-items-center">

            <!-- LEFT SIDE -->
            <div>
                <button class="left_btns">Find</button>
                <button class="left_btns">Organize</button>
                <button class="left_btns">Contact</button>
            </div>

            <!-- SPACER -->
            <div class="flex-grow-1"></div>

            <!-- RIGHT SIDE -->
            <div>
                <a href="http://localhost:8080/login.html" class="login_btn">Log In</a>
                <button class="info_btn"><i class="fa-regular fa-circle-question"></i></button>
            </div>

        </div>
    </div>
</section>

<!-- MAIN CONTENT -->
<div class="find-wrapper">

    <!-- SIDEBAR - događaji -->
    <aside class="find-sidebar">
        <h3 class="sidebar-title">Upcoming Events</h3>

        <div class="event-card" th:each="event : ${events}">
            <div class="event-info">
                <span class="event-cafe"  th:text="${event.cafe.name}"></span>
                <span class="event-game"  th:text="${event.gameName}"></span>
                <span class="event-time"  th:text="${#temporals.format(event.eventDatetime, 'dd.MM.yyyy HH:mm')}"></span>
                <span class="event-spots" th:text="${event.maxPlayers} + ' spots'"></span>
            </div>
            <form th:action="@{/join}" method="post">
                <input type="hidden" name="eventId" th:value="${event.id}">
                <button class="join-btn" type="submit">Join</button>
            </form>
        </div>

    </aside>

    <!-- MAPA - zamijeniti src s tvojim My Maps linkom -->
    <div class="find-map">
        <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d177883.25768654494!2d15.964364100000001!3d45.84277485!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4765d692c902cc39%3A0x3a45249628fbc28a!2sZagreb!5e0!3m2!1shr!2shr!4v1777142342439!5m2!1shr!2shr"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>

</div>

</body>
</html>
