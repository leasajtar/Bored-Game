<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://kit.fontawesome.com/34542901a1.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<section class="nav-bar">
    <div class="container-fluid">
        <div class="d-flex align-items-center">
            <div>
                <a th:href="@{/find}" class="left_btns">Find</a>
                <button class="left_btns">Organize</button>
                <button class="left_btns">Contact</button>
            </div>
            <div class="flex-grow-1"></div>
            <div>
                <a th:href="@{/login}" class="login_btn">Log In</a>
                <button class="info_btn"><i class="fa-regular fa-circle-question"></i></button>
            </div>
        </div>
    </div>
</section>

<section class="login">
    <h2>Register:</h2>

    <!-- Poruka o grešci ako username već postoji -->
    <p th:if="${param.error == 'exists'}" style="color: red;">Korisničko ime već postoji.</p>
    <!-- Poruka o uspjehu -->
    <p th:if="${param.success}" style="color: green;">Registracija uspješna! Možeš se prijaviti.</p>

    <div class="login_form">
        <form action="/register" method="post">
            <input name="username"  placeholder="Username"        required><br>
            <input name="password"  placeholder="Password"        type="password" required><br>
            <input name="email"     placeholder="Email"           type="email" required><br>
            <input name="ime"       placeholder="Ime"             required><br>
            <input name="prezime"   placeholder="Prezime"         required><br>

            <section class="gender_btns">
                <label><input type="radio" name="gender" value="0"> Female</label><br>
                <label><input type="radio" name="gender" value="1"> Male</label><br>
                <label><input type="radio" name="gender" value="2"> Other</label><br>
            </section>

            <input name="phone" placeholder="Phone (optional)"><br>

            <button class="login_submit_btn" type="submit">Submit</button>
        </form>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
