<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/34542901a1.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<section class="nav-bar">
    <div class="container-fluid">
        <div class="d-flex align-items-center">


            <!-- LEFT SIDE -->
            <div>
                <button class="left_btns">Find</button>
                <button class="left_btns">Organize</button>
                <button class="left_btns">Contact</button>
            </div>

            <!-- SPACER -->
            <div class="flex-grow-1"></div>

            <!-- RIGHT SIDE -->
            <div>
                <button class="login_btn">Log In</button>
                <button class="info_btn"><i class="fa-regular fa-circle-question"></i></button>
            </div>

        </div>
    </div>
</section>
<section class="login">
    <h2>Login:</h2>
    <div class="login_form">
        <form id="userForm">
            <input name="username" placeholder="Username"><br>
            <input name="password" placeholder="Password" type="password"><br>
            <input name="email" placeholder="Email" type="email"><br>
            <input name="ime" placeholder="Ime"><br>
            <input name="prezime" placeholder="Prezime"><br>

            <section class="gender_btns">
            <label>
                <input type="radio" name="gender" value="0">
                Female
            </label><br>

            <label>
                <input type="radio" name="gender" value="1">
                Male
            </label><br>

            <label>
                <input type="radio" name="gender" value="2">
                Other
            </label><br>
            </section>

            <input name="phone" placeholder="Phone optional"><br>

            <button class="login_submit_btn" type="submit">Submit</button>
        </form>
    </div>
</section>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
